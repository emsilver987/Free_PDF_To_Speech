<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Speech Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: none;
            cursor: pointer;
            color: #666;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .drop-zone {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .drop-zone:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .drop-zone.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .drop-zone p {
            color: #666;
            margin-bottom: 10px;
        }

        .drop-zone-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .file-input {
            display: none;
        }

        .file-list {
            margin-top: 20px;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9ff;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .file-item-name {
            color: #333;
            font-weight: 500;
        }

        .file-item-size {
            color: #999;
            font-size: 12px;
        }

        .remove-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .settings {
            margin: 20px 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 500;
        }

        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="range"] {
            flex: 1;
        }

        .speed-value {
            min-width: 40px;
            text-align: right;
            color: #667eea;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #eee;
            color: #333;
        }

        .btn-secondary:hover {
            background: #ddd;
        }

        .jobs-list {
            margin-top: 20px;
        }

        .job-item {
            padding: 16px;
            background: #f8f9ff;
            border-radius: 6px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .job-name {
            color: #333;
            font-weight: 600;
        }

        .job-status {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-queued {
            background: #fff3cd;
            color: #856404;
        }

        .status-processing {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }

        .job-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }

        .job-progress {
            width: 100%;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .job-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 PDF to Speech</h1>
        <p class="subtitle">Convert your PDFs to high-quality audio</p>

        <div id="apiStatus" style="padding: 12px; border-radius: 6px; margin-bottom: 20px; display: none; text-align: center; font-weight: 500;">
            <span id="apiStatusText"></span>
        </div>

        <div class="alert" id="alert"></div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="convert">Convert</button>
            <button class="tab-btn" data-tab="jobs">Jobs</button>
        </div>

        <!-- Convert Tab -->
        <div class="tab-content active" id="convert-tab">
            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-icon">📄</div>
                <p><strong>Drag & drop your PDFs here</strong></p>
                <p style="font-size: 12px; color: #999;">or click to browse</p>
            </div>

            <div class="file-list" id="fileList"></div>

            <div class="settings">
                <div class="form-group">
                    <label for="engine">TTS Engine</label>
                    <select id="engine">
                        <option value="gtts">Google TTS (Online, High Quality)</option>
                        <option value="system">System TTS (Offline, Fast)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="voice">Voice</label>
                    <select id="voice"></select>
                </div>

                <div class="form-group">
                    <label>Speed</label>
                    <div class="slider-container">
                        <input type="range" id="speed" min="0.5" max="2.0" step="0.1" value="1.0">
                        <span class="speed-value" id="speedValue">1.0x</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        <input type="checkbox" id="async" checked> Process asynchronously
                    </label>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-primary" id="convertBtn" disabled>Convert</button>
                <button class="btn-secondary" id="clearBtn">Clear</button>
            </div>
        </div>

        <!-- Jobs Tab -->
        <div class="tab-content" id="jobs-tab">
            <div class="jobs-list" id="jobsList">
                <p style="color: #999; text-align: center;">No jobs yet</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:5000/api";

        let selectedFiles = [];
        let jobs = [];

        // Elements
        const dropZone = document.getElementById("dropZone");
        const fileInput = document.createElement("input");
        const fileList = document.getElementById("fileList");
        const convertBtn = document.getElementById("convertBtn");
        const clearBtn = document.getElementById("clearBtn");
        const engineSelect = document.getElementById("engine");
        const voiceSelect = document.getElementById("voice");
        const speedRange = document.getElementById("speed");
        const speedValue = document.getElementById("speedValue");
        const asyncCheckbox = document.getElementById("async");
        const jobsList = document.getElementById("jobsList");
        const alert = document.getElementById("alert");

        // Setup
        fileInput.type = "file";
        fileInput.multiple = true;
        fileInput.accept = ".pdf";

        // Event listeners
        dropZone.addEventListener("click", () => fileInput.click());
        dropZone.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZone.classList.add("dragover");
        });
        dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
        dropZone.addEventListener("drop", (e) => {
            e.preventDefault();
            dropZone.classList.remove("dragover");
            handleFiles(Array.from(e.dataTransfer.files));
        });

        fileInput.addEventListener("change", (e) => {
            handleFiles(Array.from(e.target.files));
        });

        convertBtn.addEventListener("click", convertFiles);
        clearBtn.addEventListener("click", () => {
            selectedFiles = [];
            fileList.innerHTML = "";
            convertBtn.disabled = true;
            updateFileList();
        });

        engineSelect.addEventListener("change", loadVoices);
        speedRange.addEventListener("input", (e) => {
            speedValue.textContent = parseFloat(e.target.value).toFixed(1) + "x";
        });

        // Tab switching
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const tabName = btn.dataset.tab;
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
                btn.classList.add("active");
                document.getElementById(tabName + "-tab").classList.add("active");
                
                if (tabName === "jobs") {
                    refreshJobs();
                }
            });
        });

        function handleFiles(files) {
            const pdfs = files.filter(f => f.type === "application/pdf");
            if (pdfs.length === 0) {
                showAlert("Please select PDF files", "error");
                return;
            }
            selectedFiles = [...selectedFiles, ...pdfs];
            updateFileList();
        }

        function updateFileList() {
            fileList.innerHTML = selectedFiles.map((file, idx) => `
                <div class="file-item">
                    <div>
                        <div class="file-item-name">${file.name}</div>
                        <div class="file-item-size">${(file.size / 1024 / 1024).toFixed(2)} MB</div>
                    </div>
                    <button class="remove-btn" onclick="removeFile(${idx})">Remove</button>
                </div>
            `).join("");

            convertBtn.disabled = selectedFiles.length === 0;
        }

        function removeFile(idx) {
            selectedFiles.splice(idx, 1);
            updateFileList();
        }

        async function loadVoices() {
            const engine = engineSelect.value;
            try {
                const response = await fetch(`${API_BASE}/voices?engine=${engine}`);
                const data = await response.json();
                
                if (data.voices && data.voices.length > 0) {
                    voiceSelect.innerHTML = data.voices.map(v => 
                        `<option value="${v.id}">${v.name}</option>`
                    ).join("");
                } else {
                    // Fallback: use sensible defaults
                    const defaults = {
                        gtts: [{ id: "en", name: "English (Google TTS)" }],
                        system: [{ id: "default", name: "System Default" }]
                    };
                    voiceSelect.innerHTML = (defaults[engine] || defaults.gtts)
                        .map(v => `<option value="${v.id}">${v.name}</option>`)
                        .join("");
                }
            } catch (e) {
                console.error("Failed to load voices:", e);
                // Fallback on error
                voiceSelect.innerHTML = `<option value="en">English (Default)</option>`;
            }
        }

        async function convertFiles() {
            if (selectedFiles.length === 0) return;

            const formData = new FormData();
            formData.append("engine", engineSelect.value);
            // Voice is optional - only add if selected
            const voice = voiceSelect.value;
            if (voice) {
                formData.append("voice", voice);
            }
            formData.append("speed", speedRange.value);
            formData.append("async", asyncCheckbox.checked);

            selectedFiles.forEach(file => {
                formData.append("files", file);
            });

            try {
                convertBtn.disabled = true;
                const endpoint = selectedFiles.length === 1 ? "/convert" : "/batch";
                const url = `${API_BASE}${endpoint}`;
                
                console.log("Converting files...");
                console.log(`POST ${url}`);
                console.log(`Files: ${selectedFiles.map(f => f.name).join(', ')}`);
                console.log(`Engine: ${engineSelect.value}`);
                console.log(`Speed: ${speedRange.value}`);
                
                const response = await fetch(url, {
                    method: "POST",
                    body: formData
                });

                console.log(`Response status: ${response.status}`);

                const data = await response.json();
                console.log("Response:", data);

                if (response.ok || response.status === 202) {
                    showAlert(`${selectedFiles.length} file(s) queued for conversion`, "success");
                    jobs = [...jobs, ...(Array.isArray(data.job_ids) ? data.job_ids : [data.job_id])];
                    selectedFiles = [];
                    updateFileList();
                    
                    if (asyncCheckbox.checked) {
                        document.querySelector('[data-tab="jobs"]').click();
                    }
                } else {
                    const errorMsg = data.error || data.message || "Conversion failed";
                    console.error("Error response:", data);
                    showAlert(errorMsg, "error");
                }
            } catch (e) {
                console.error("Fetch error:", e);
                showAlert(`Connection error: ${e.message}. Is the API running? (python run.py)`, "error");
                convertBtn.disabled = false;
            }
        }

        async function refreshJobs() {
            jobsList.innerHTML = jobs.length === 0 ? 
                '<p style="color: #999; text-align: center;">No jobs yet</p>' : '';

            for (const jobId of jobs) {
                try {
                    const response = await fetch(`${API_BASE}/jobs/${jobId}`);
                    const job = await response.json();
                    
                    const statusClass = `status-${job.status}`;
                    const progress = job.status === "processing" ? 50 : 
                                   job.status === "completed" ? 100 : 0;
                    
                    const jobEl = document.createElement("div");
                    jobEl.className = "job-item";
                    jobEl.id = `job-${jobId}`;
                    jobEl.innerHTML = `
                        <div class="job-header">
                            <div class="job-name">${job.filename}</div>
                            <span class="job-status ${statusClass}">${job.status.toUpperCase()}</span>
                        </div>
                        <div class="job-meta">
                            Started: ${new Date(job.started_at || job.created_at).toLocaleString()}
                        </div>
                        <div class="job-progress">
                            <div class="progress-bar" style="width: ${progress}%"></div>
                        </div>
                        ${job.status === "completed" ? `
                            <div class="job-actions">
                                <button class="btn-primary btn-small" onclick="downloadJob('${jobId}')">Download</button>
                            </div>
                        ` : ''}
                        ${job.status === "failed" ? `
                            <div class="job-meta" style="color: #ff4757; margin-top: 8px;">${job.error}</div>
                        ` : ''}
                    `;
                    
                    jobsList.innerHTML = "";
                    jobsList.appendChild(jobEl);
                } catch (e) {
                    console.error(`Failed to load job ${jobId}:`, e);
                }
            }
        }

        function downloadJob(jobId) {
            window.open(`${API_BASE}/download/${jobId}`, "_blank");
        }

        function showAlert(message, type) {
            alert.textContent = message;
            alert.className = `alert show alert-${type}`;
            setTimeout(() => alert.classList.remove("show"), 5000);
        }

        // Check API health
        async function checkAPIHealth() {
            const statusEl = document.getElementById('apiStatus');
            const statusText = document.getElementById('apiStatusText');
            
            try {
                const response = await fetch(`${API_BASE}/health`, { 
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (response.ok) {
                    statusEl.style.display = 'block';
                    statusEl.style.background = '#d4edda';
                    statusEl.style.color = '#155724';
                    statusEl.style.border = '1px solid #c3e6cb';
                    statusText.textContent = '✅ API Connected';
                    convertBtn.disabled = selectedFiles.length === 0;
                    return true;
                }
            } catch (e) {
                statusEl.style.display = 'block';
                statusEl.style.background = '#f8d7da';
                statusEl.style.color = '#721c24';
                statusEl.style.border = '1px solid #f5c6cb';
                statusText.textContent = `❌ API Unavailable (${API_BASE}) - Make sure backend is running: python run.py`;
                convertBtn.disabled = true;
                return false;
            }
        }
        
        // Initial setup
        function initializeUI() {
            checkAPIHealth();
            loadVoices();
            
            // Recheck health every 10 seconds
            setInterval(checkAPIHealth, 10000);
        }
        
        // Load voices when page loads
        document.addEventListener('DOMContentLoaded', initializeUI);
    </script>
</body>
</html>
